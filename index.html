<!DOCTYPE html>

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cargo Provisions" />

      property="og:description"

    <meta property="og:url" content="https://provisions.cargotechnology.co.uk/" />

    <meta property="og:image:alt" content="Cargo Provisions — the simple provisioning list for superyacht chefs" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cargo Provisions" />
    <meta
      name="twitter:description"
      content="The simple provisioning list for superyacht chefs — build your list and send it off."

    <meta name="twitter:image:alt" content="Cargo Provisions — the simple provisioning list for superyacht chefs" />

        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "GBP" }

    <link

    <div id="root"></div>
